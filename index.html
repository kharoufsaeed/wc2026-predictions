<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self' 'unsafe-inline';
    style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    font-src https://cdn.jsdelivr.net;
    img-src 'self' data:;
    connect-src 'self' https://api.github.com https://wc2026-predictions-game.workers.dev;
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
  ">
  <title>FIFA World Cup 2026 - Prediction Competition</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"
        integrity="sha384-aQuvIWWIbpu/mSqULLDiUveyYiPoJzPKAWjUmGJ+Elm+N/LJhzfZqsutsfw870JS"
        crossorigin="anonymous">
</head>
<body>
  <!-- Banner -->
  <div class="site-banner">
    <h1>World Cup 2026<br>Predictions Competition</h1>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="user-info" id="user-info" style="display: none;">
        <div class="tz-selector" id="tz-selector">
          <label>TZ:</label>
          <select id="tz-select" onchange="App.setTimezone(this.value)">
            <optgroup label="── Americas ──">
              <option value="HT">HT — Hawaii (UTC-10)</option>
              <option value="AKT">AKT — Alaska (UTC-8)</option>
              <option value="PT">PT — Pacific (UTC-7)</option>
              <option value="MT">MT — Mountain (UTC-6)</option>
              <option value="CT" selected>CT — Central (UTC-5)</option>
              <option value="ET">ET — Eastern (UTC-4)</option>
              <option value="AT">AT — Atlantic/Canada (UTC-3)</option>
              <option value="BRT">BRT — Brazil (UTC-3)</option>
              <option value="ART">ART — Argentina (UTC-3)</option>
            </optgroup>
            <optgroup label="── Europe & Africa ──">
              <option value="UTC">UTC — UTC / Iceland (UTC+0)</option>
              <option value="BST">BST — UK &amp; Ireland Summer (UTC+1)</option>
              <option value="CEST">CEST — Central Europe Summer (UTC+2)</option>
              <option value="EEST">EEST — Eastern Europe Summer (UTC+3)</option>
              <option value="MSK">MSK — Moscow / Arabia (UTC+3)</option>
              <option value="EAT">EAT — East Africa (UTC+3)</option>
              <option value="GST">GST — Gulf: UAE, Qatar (UTC+4)</option>
            </optgroup>
            <optgroup label="── Asia ──">
              <option value="PKT">PKT — Pakistan (UTC+5)</option>
              <option value="IST">IST — India / Sri Lanka (UTC+5:30)</option>
              <option value="BDT">BDT — Bangladesh (UTC+6)</option>
              <option value="MMT">MMT — Myanmar (UTC+6:30)</option>
              <option value="ICT">ICT — Thailand / Vietnam (UTC+7)</option>
              <option value="CST">CST — China / Singapore (UTC+8)</option>
              <option value="JST">JST — Japan (UTC+9)</option>
              <option value="KST">KST — Korea (UTC+9)</option>
            </optgroup>
            <optgroup label="── Pacific ──">
              <option value="ACST">ACST — Australia Central (UTC+9:30)</option>
              <option value="AEST">AEST — Australia Eastern (UTC+10)</option>
              <option value="NZST">NZST — New Zealand (UTC+12)</option>
            </optgroup>
          </select>
        </div>
        <span class="name" id="player-name-display"></span>
        <button class="logout-btn" onclick="App.logout()">Switch User</button>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav" style="display: none;">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="general">General Predictions</button>
      <button class="nav-tab" data-tab="matches">Matches</button>
      <button class="nav-tab" data-tab="standings">Standings</button>
      <button class="nav-tab" data-tab="leaderboard">Leaderboard</button>
      <button class="nav-tab" data-tab="bracket">Bracket</button>
      <button class="nav-tab" data-tab="rules">Scoring Rules</button>
    </div>
  </nav>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <img src="assets/pictures/2026_FIFA_World_Cup_emblem.svg.webp" alt="WC2026 Logo" class="login-logo">
      <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 1rem;">Predict scores, pick winners, and compete with your pool across all 104 matches of the 2026 FIFA World Cup.</p>
      <div class="competition-select">
        <select id="login-competition">
          <option value="" disabled selected>Choose competition...</option>
        </select>
      </div>
      <input type="text" id="login-name" placeholder="Your name" onkeypress="if(event.key==='Enter') App.login()">
      <button class="btn btn-primary" onclick="App.login()">Join Competition</button>
      <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-light);">
        USA / Mexico / Canada | June 11 - July 19, 2026
      </p>
    </div>
  </div>

  <!-- Main App Content -->
  <main class="main" id="app-content" style="display: none;">
    <div class="tab-content active" id="tab-general">
      <div id="general-container"></div>
    </div>
    <div class="tab-content" id="tab-matches">
      <div id="matches-container"></div>
    </div>
    <div class="tab-content" id="tab-standings">
      <div id="standings-container"></div>
    </div>
    <div class="tab-content" id="tab-leaderboard">
      <div id="leaderboard-container"></div>
    </div>
    <div class="tab-content" id="tab-bracket">
      <div id="bracket-container"></div>
    </div>
    <div class="tab-content" id="tab-rules">
      <div id="rules-container"></div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/matches.js"></script>
  <script src="js/players.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/player-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
